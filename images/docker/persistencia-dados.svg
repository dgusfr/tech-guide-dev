<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <style>
      .bg{fill:#f8fafc}
      .card{fill:#ffffff;stroke:#cbd5e1;stroke-width:2;rx:24}
      .box{fill:#eef2ff;stroke:#6366f1;stroke-width:2;rx:18}
      .box2{fill:#ecfdf5;stroke:#10b981;stroke-width:2;rx:18}
      .box3{fill:#fff7ed;stroke:#f97316;stroke-width:2;rx:18}
      .box4{fill:#fef2f2;stroke:#ef4444;stroke-width:2;rx:18}
      .text{font-family:Arial, Helvetica, sans-serif;fill:#0f172a;font-size:26px}
      .small{font-family:Arial, Helvetica, sans-serif;fill:#334155;font-size:20px}
      .tiny{font-family:Arial, Helvetica, sans-serif;fill:#475569;font-size:17px}
      .title{font-family:Arial, Helvetica, sans-serif;fill:#0f172a;font-size:34px;font-weight:700}
      .arrow{stroke:#334155;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="700"/>
  <text class="title" x="60" y="70">Persistência de dados no Docker</text>
  
  <rect class="box" x="80" y="180" width="300" height="170"/><text class="text" x="150" y="235">Bind mount</text><text class="tiny" x="115" y="278">host controla o caminho</text><text class="tiny" x="115" y="310">bom para desenvolvimento</text>
  <rect class="box2" x="450" y="180" width="300" height="170"/><text class="text" x="555" y="235">Volume</text><text class="tiny" x="490" y="278">Docker gerencia os dados</text><text class="tiny" x="490" y="310">preferível em produção</text>
  <rect class="box3" x="820" y="180" width="300" height="170"/><text class="text" x="930" y="235">tmpfs</text><text class="tiny" x="870" y="278">dados ficam em memória</text><text class="tiny" x="870" y="310">não persiste ao parar</text>
  <rect class="card" x="180" y="440" width="840" height="120"/>
  <text class="small" x="220" y="495">Use volumes para banco de dados, bind mounts para código local</text>
  <text class="small" x="220" y="530">e tmpfs para arquivos temporários sensíveis.</text>

</svg>