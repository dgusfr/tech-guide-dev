<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <style>
      .bg{fill:#f8fafc}
      .card{fill:#ffffff;stroke:#cbd5e1;stroke-width:2;rx:24}
      .box{fill:#eef2ff;stroke:#6366f1;stroke-width:2;rx:18}
      .box2{fill:#ecfdf5;stroke:#10b981;stroke-width:2;rx:18}
      .box3{fill:#fff7ed;stroke:#f97316;stroke-width:2;rx:18}
      .box4{fill:#fef2f2;stroke:#ef4444;stroke-width:2;rx:18}
      .text{font-family:Arial, Helvetica, sans-serif;fill:#0f172a;font-size:26px}
      .small{font-family:Arial, Helvetica, sans-serif;fill:#334155;font-size:20px}
      .tiny{font-family:Arial, Helvetica, sans-serif;fill:#475569;font-size:17px}
      .title{font-family:Arial, Helvetica, sans-serif;fill:#0f172a;font-size:34px;font-weight:700}
      .arrow{stroke:#334155;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="700"/>
  <text class="title" x="60" y="70">Máquinas virtuais vs containers</text>
  
  <rect class="card" x="70" y="130" width="500" height="500"/>
  <text class="text" x="220" y="180">Máquinas Virtuais</text>
  <rect class="box4" x="120" y="230" width="400" height="75"/><text class="small" x="180" y="278">App + bibliotecas</text>
  <rect class="box3" x="120" y="325" width="400" height="75"/><text class="small" x="190" y="373">Sistema operacional</text>
  <rect class="box" x="120" y="420" width="400" height="75"/><text class="small" x="215" y="468">Hypervisor</text>
  <rect class="box2" x="120" y="515" width="400" height="75"/><text class="small" x="245" y="563">Hardware</text>
  <rect class="card" x="630" y="130" width="500" height="500"/>
  <text class="text" x="790" y="180">Containers</text>
  <rect class="box4" x="680" y="230" width="400" height="75"/><text class="small" x="740" y="278">App + dependências</text>
  <rect class="box" x="680" y="325" width="400" height="75"/><text class="small" x="800" y="373">Docker Engine</text>
  <rect class="box3" x="680" y="420" width="400" height="75"/><text class="small" x="800" y="468">Kernel do host</text>
  <rect class="box2" x="680" y="515" width="400" height="75"/><text class="small" x="805" y="563">Hardware</text>

</svg>