<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <style>
      .bg{fill:#f8fafc}
      .card{fill:#ffffff;stroke:#cbd5e1;stroke-width:2;rx:24}
      .box{fill:#eef2ff;stroke:#6366f1;stroke-width:2;rx:18}
      .box2{fill:#ecfdf5;stroke:#10b981;stroke-width:2;rx:18}
      .box3{fill:#fff7ed;stroke:#f97316;stroke-width:2;rx:18}
      .box4{fill:#fef2f2;stroke:#ef4444;stroke-width:2;rx:18}
      .text{font-family:Arial, Helvetica, sans-serif;fill:#0f172a;font-size:26px}
      .small{font-family:Arial, Helvetica, sans-serif;fill:#334155;font-size:20px}
      .tiny{font-family:Arial, Helvetica, sans-serif;fill:#475569;font-size:17px}
      .title{font-family:Arial, Helvetica, sans-serif;fill:#0f172a;font-size:34px;font-weight:700}
      .arrow{stroke:#334155;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="700"/>
  <text class="title" x="60" y="70">Camadas de uma imagem Docker</text>
  
  <rect class="box2" x="330" y="140" width="540" height="70"/><text class="small" x="490" y="185">FROM python:3.12-slim</text>
  <rect class="box" x="330" y="230" width="540" height="70"/><text class="small" x="475" y="275">WORKDIR /app</text>
  <rect class="box3" x="330" y="320" width="540" height="70"/><text class="small" x="450" y="365">COPY requirements.txt .</text>
  <rect class="box4" x="330" y="410" width="540" height="70"/><text class="small" x="480" y="455">RUN pip install ...</text>
  <rect class="box" x="330" y="500" width="540" height="70"/><text class="small" x="510" y="545">COPY app/ .</text>
  <text class="small" x="160" y="640">Cada instrução gera uma camada. O cache reaproveita camadas que não mudaram.</text>

</svg>