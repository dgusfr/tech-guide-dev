<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <style>
      .bg{fill:#f8fafc}
      .card{fill:#ffffff;stroke:#cbd5e1;stroke-width:2;rx:24}
      .box{fill:#eef2ff;stroke:#6366f1;stroke-width:2;rx:18}
      .box2{fill:#ecfdf5;stroke:#10b981;stroke-width:2;rx:18}
      .box3{fill:#fff7ed;stroke:#f97316;stroke-width:2;rx:18}
      .box4{fill:#fef2f2;stroke:#ef4444;stroke-width:2;rx:18}
      .text{font-family:Arial, Helvetica, sans-serif;fill:#0f172a;font-size:26px}
      .small{font-family:Arial, Helvetica, sans-serif;fill:#334155;font-size:20px}
      .tiny{font-family:Arial, Helvetica, sans-serif;fill:#475569;font-size:17px}
      .title{font-family:Arial, Helvetica, sans-serif;fill:#0f172a;font-size:34px;font-weight:700}
      .arrow{stroke:#334155;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="700"/>
  <text class="title" x="60" y="70">Fluxo básico do Docker</text>
  
  <rect class="box" x="70" y="160" width="230" height="120"/>
  <text class="text" x="110" y="215">Dockerfile</text>
  <text class="tiny" x="95" y="248">receita da imagem</text>
  <path class="arrow" d="M310 220 L430 220"/>
  <rect class="box2" x="450" y="160" width="250" height="120"/>
  <text class="text" x="520" y="215">Imagem</text>
  <text class="tiny" x="485" y="248">modelo imutável</text>
  <path class="arrow" d="M710 220 L830 220"/>
  <rect class="box3" x="850" y="160" width="270" height="120"/>
  <text class="text" x="920" y="215">Container</text>
  <text class="tiny" x="885" y="248">processo isolado</text>
  <rect class="card" x="100" y="390" width="1000" height="180"/>
  <text class="small" x="150" y="450">1. docker build cria uma imagem a partir do Dockerfile.</text>
  <text class="small" x="150" y="490">2. docker run cria e executa um container a partir da imagem.</text>
  <text class="small" x="150" y="530">3. docker push envia a imagem para um registry, como Docker Hub.</text>

</svg>