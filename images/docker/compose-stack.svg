<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <style>
      .bg{fill:#f8fafc}
      .card{fill:#ffffff;stroke:#cbd5e1;stroke-width:2;rx:24}
      .box{fill:#eef2ff;stroke:#6366f1;stroke-width:2;rx:18}
      .box2{fill:#ecfdf5;stroke:#10b981;stroke-width:2;rx:18}
      .box3{fill:#fff7ed;stroke:#f97316;stroke-width:2;rx:18}
      .box4{fill:#fef2f2;stroke:#ef4444;stroke-width:2;rx:18}
      .text{font-family:Arial, Helvetica, sans-serif;fill:#0f172a;font-size:26px}
      .small{font-family:Arial, Helvetica, sans-serif;fill:#334155;font-size:20px}
      .tiny{font-family:Arial, Helvetica, sans-serif;fill:#475569;font-size:17px}
      .title{font-family:Arial, Helvetica, sans-serif;fill:#0f172a;font-size:34px;font-weight:700}
      .arrow{stroke:#334155;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="700"/>
  <text class="title" x="60" y="70">Docker Compose: aplicação multi-container</text>
  
  <rect class="box" x="90" y="160" width="260" height="130"/><text class="text" x="160" y="215">compose.yaml</text><text class="tiny" x="130" y="250">declara serviços, redes e volumes</text>
  <path class="arrow" d="M360 225 L470 225"/>
  <rect class="card" x="500" y="110" width="600" height="470"/>
  <text class="text" x="700" y="170">Stack local</text>
  <rect class="box" x="570" y="230" width="180" height="95"/><text class="small" x="635" y="285">api</text>
  <rect class="box2" x="820" y="230" width="180" height="95"/><text class="small" x="880" y="285">db</text>
  <rect class="box3" x="570" y="390" width="180" height="95"/><text class="small" x="620" y="445">worker</text>
  <rect class="box4" x="820" y="390" width="180" height="95"/><text class="small" x="885" y="445">redis</text>
  <path class="arrow" d="M750 275 L810 275"/>
  <path class="arrow" d="M750 435 L810 435"/>

</svg>