<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-label="Monitoramento de processos">
<defs><style>text{font-family:Arial,Helvetica,sans-serif;fill:#111827}.title{font-size:34px;font-weight:700}.sub{font-size:18px;fill:#4b5563}.box-title{font-size:19px;font-weight:700}.box-text{font-size:15px;fill:#374151}.small{font-size:13px;fill:#6b7280}</style></defs>
<rect width="100%" height="100%" fill="#ffffff"/>
<text x="50" y="60" class="title">Monitoramento de processos</text>
<text x="50" y="92" class="sub">Comandos para descobrir o que está rodando e consumindo recursos.</text>
<rect x="50" y="135" width="300" height="115" rx="18" fill="#f3f4f6" stroke="#d1d5db"/>
<text x="70" y="169" class="box-title">ps aux</text>
<text x="70" y="197" class="box-text">Lista processos em formato</text>
<text x="70" y="217" class="box-text">detalhado.</text>
<rect x="385" y="135" width="300" height="115" rx="18" fill="#e0f2fe" stroke="#d1d5db"/>
<text x="405" y="169" class="box-title">top / htop</text>
<text x="405" y="197" class="box-text">Mostra CPU e memória em tempo</text>
<text x="405" y="217" class="box-text">real.</text>
<rect x="720" y="135" width="300" height="115" rx="18" fill="#dcfce7" stroke="#d1d5db"/>
<text x="740" y="169" class="box-title">pgrep</text>
<text x="740" y="197" class="box-text">Encontra PIDs por nome de</text>
<text x="740" y="217" class="box-text">processo.</text>
<rect x="50" y="280" width="300" height="115" rx="18" fill="#fef3c7" stroke="#d1d5db"/>
<text x="70" y="314" class="box-title">kill</text>
<text x="70" y="342" class="box-text">Envia sinais para finalizar ou</text>
<text x="70" y="362" class="box-text">controlar processos.</text>
<rect x="385" y="280" width="300" height="115" rx="18" fill="#fee2e2" stroke="#d1d5db"/>
<text x="405" y="314" class="box-title">systemctl</text>
<text x="405" y="342" class="box-text">Controla serviços gerenciados pelo</text>
<text x="405" y="362" class="box-text">systemd.</text>
<rect x="720" y="280" width="300" height="115" rx="18" fill="#ede9fe" stroke="#d1d5db"/>
<text x="740" y="314" class="box-title">journalctl</text>
<text x="740" y="342" class="box-text">Consulta logs de serviços e do</text>
<text x="740" y="362" class="box-text">sistema.</text>
</svg>