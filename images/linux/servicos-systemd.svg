<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-label="Serviços com systemd">
<defs><style>text{font-family:Arial,Helvetica,sans-serif;fill:#111827}.title{font-size:34px;font-weight:700}.sub{font-size:18px;fill:#4b5563}.box-title{font-size:19px;font-weight:700}.box-text{font-size:15px;fill:#374151}.small{font-size:13px;fill:#6b7280}</style></defs>
<rect width="100%" height="100%" fill="#ffffff"/>
<text x="50" y="60" class="title">Serviços com systemd</text>
<text x="50" y="92" class="sub">O systemd gerencia processos de longa duração, reinício, logs e inicialização.</text>
<rect x="50" y="135" width="300" height="115" rx="18" fill="#f3f4f6" stroke="#d1d5db"/>
<text x="70" y="169" class="box-title">unit file</text>
<text x="70" y="197" class="box-text">Arquivo .service descreve como o</text>
<text x="70" y="217" class="box-text">serviço deve rodar.</text>
<rect x="385" y="135" width="300" height="115" rx="18" fill="#e0f2fe" stroke="#d1d5db"/>
<text x="405" y="169" class="box-title">start/stop</text>
<text x="405" y="197" class="box-text">Inicia, para ou reinicia serviços</text>
<text x="405" y="217" class="box-text">sob demanda.</text>
<rect x="720" y="135" width="300" height="115" rx="18" fill="#dcfce7" stroke="#d1d5db"/>
<text x="740" y="169" class="box-title">enable</text>
<text x="740" y="197" class="box-text">Configura serviço para subir com o</text>
<text x="740" y="217" class="box-text">sistema.</text>
<rect x="50" y="280" width="300" height="115" rx="18" fill="#fef3c7" stroke="#d1d5db"/>
<text x="70" y="314" class="box-title">status</text>
<text x="70" y="342" class="box-text">Mostra estado atual e últimos</text>
<text x="70" y="362" class="box-text">logs.</text>
<rect x="385" y="280" width="300" height="115" rx="18" fill="#fee2e2" stroke="#d1d5db"/>
<text x="405" y="314" class="box-title">journalctl</text>
<text x="405" y="342" class="box-text">Lê logs completos de uma unidade.</text>
<rect x="720" y="280" width="300" height="115" rx="18" fill="#ede9fe" stroke="#d1d5db"/>
<text x="740" y="314" class="box-title">restart policy</text>
<text x="740" y="342" class="box-text">Pode reiniciar serviços quando</text>
<text x="740" y="362" class="box-text">falham.</text>
</svg>