<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-label="Pipes e redirecionamentos">
<defs><style>text{font-family:Arial,Helvetica,sans-serif;fill:#111827}.title{font-size:34px;font-weight:700}.sub{font-size:18px;fill:#4b5563}.box-title{font-size:19px;font-weight:700}.box-text{font-size:15px;fill:#374151}.small{font-size:13px;fill:#6b7280}</style></defs>
<rect width="100%" height="100%" fill="#ffffff"/>
<text x="50" y="60" class="title">Pipes e redirecionamentos</text>
<text x="50" y="92" class="sub">A saída de um comando pode virar entrada de outro ou ser enviada para arquivos.</text>
<rect x="50" y="135" width="300" height="115" rx="18" fill="#f3f4f6" stroke="#d1d5db"/>
<text x="70" y="169" class="box-title">stdout</text>
<text x="70" y="197" class="box-text">Saída padrão. Normalmente aparece</text>
<text x="70" y="217" class="box-text">no terminal.</text>
<rect x="385" y="135" width="300" height="115" rx="18" fill="#e0f2fe" stroke="#d1d5db"/>
<text x="405" y="169" class="box-title">stderr</text>
<text x="405" y="197" class="box-text">Saída de erro. Pode ser</text>
<text x="405" y="217" class="box-text">redirecionada separadamente.</text>
<rect x="720" y="135" width="300" height="115" rx="18" fill="#dcfce7" stroke="#d1d5db"/>
<text x="740" y="169" class="box-title">&gt;</text>
<text x="740" y="197" class="box-text">Sobrescreve um arquivo com a saída</text>
<text x="740" y="217" class="box-text">do comando.</text>
<rect x="50" y="280" width="300" height="115" rx="18" fill="#fef3c7" stroke="#d1d5db"/>
<text x="70" y="314" class="box-title">&gt;&gt;</text>
<text x="70" y="342" class="box-text">Adiciona a saída ao final de um</text>
<text x="70" y="362" class="box-text">arquivo.</text>
<rect x="385" y="280" width="300" height="115" rx="18" fill="#fee2e2" stroke="#d1d5db"/>
<text x="405" y="314" class="box-title">| pipe</text>
<text x="405" y="342" class="box-text">Conecta comandos: ps aux | grep</text>
<text x="405" y="362" class="box-text">nginx.</text>
<rect x="720" y="280" width="300" height="115" rx="18" fill="#ede9fe" stroke="#d1d5db"/>
<text x="740" y="314" class="box-title">/dev/null</text>
<text x="740" y="342" class="box-text">Descarta saída quando ela não é</text>
<text x="740" y="362" class="box-text">necessária.</text>
</svg>