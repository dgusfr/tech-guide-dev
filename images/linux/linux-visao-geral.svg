<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-label="Linux no dia a dia de backend">
<defs><style>text{font-family:Arial,Helvetica,sans-serif;fill:#111827}.title{font-size:34px;font-weight:700}.sub{font-size:18px;fill:#4b5563}.box-title{font-size:19px;font-weight:700}.box-text{font-size:15px;fill:#374151}.small{font-size:13px;fill:#6b7280}</style></defs>
<rect width="100%" height="100%" fill="#ffffff"/>
<text x="50" y="60" class="title">Linux no dia a dia de backend</text>
<text x="50" y="92" class="sub">Kernel, shell, pacotes, serviços, rede e automação trabalhando juntos.</text>
<rect x="50" y="135" width="300" height="115" rx="18" fill="#f3f4f6" stroke="#d1d5db"/>
<text x="70" y="169" class="box-title">Kernel</text>
<text x="70" y="197" class="box-text">Gerencia CPU, memória, disco,</text>
<text x="70" y="217" class="box-text">processos e rede.</text>
<rect x="385" y="135" width="300" height="115" rx="18" fill="#e0f2fe" stroke="#d1d5db"/>
<text x="405" y="169" class="box-title">Distribuição</text>
<text x="405" y="197" class="box-text">Ubuntu, Debian, Fedora e outras</text>
<text x="405" y="217" class="box-text">distribuições entregam kernel +</text>
<text x="405" y="237" class="box-text">ferramentas.</text>
<rect x="720" y="135" width="300" height="115" rx="18" fill="#dcfce7" stroke="#d1d5db"/>
<text x="740" y="169" class="box-title">Shell</text>
<text x="740" y="197" class="box-text">Interface de comando, como bash ou</text>
<text x="740" y="217" class="box-text">zsh, usada para operar o sistema.</text>
<rect x="50" y="280" width="300" height="115" rx="18" fill="#fef3c7" stroke="#d1d5db"/>
<text x="70" y="314" class="box-title">Pacotes</text>
<text x="70" y="342" class="box-text">Instalação e atualização de</text>
<text x="70" y="362" class="box-text">softwares via apt, dnf, pacman</text>
<text x="70" y="382" class="box-text">etc.</text>
<rect x="385" y="280" width="300" height="115" rx="18" fill="#fee2e2" stroke="#d1d5db"/>
<text x="405" y="314" class="box-title">Serviços</text>
<text x="405" y="342" class="box-text">Processos gerenciados pelo</text>
<text x="405" y="362" class="box-text">systemd, como nginx, ssh e bancos.</text>
<rect x="720" y="280" width="300" height="115" rx="18" fill="#ede9fe" stroke="#d1d5db"/>
<text x="740" y="314" class="box-title">Automação</text>
<text x="740" y="342" class="box-text">Scripts Bash repetem tarefas com</text>
<text x="740" y="362" class="box-text">segurança e consistência.</text>
</svg>