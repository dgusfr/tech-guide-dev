<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-label="Sistema de arquivos Linux">
<defs><style>text{font-family:Arial,Helvetica,sans-serif;fill:#111827}.title{font-size:34px;font-weight:700}.sub{font-size:18px;fill:#4b5563}.box-title{font-size:19px;font-weight:700}.box-text{font-size:15px;fill:#374151}.small{font-size:13px;fill:#6b7280}</style></defs>
<rect width="100%" height="100%" fill="#ffffff"/>
<text x="50" y="60" class="title">Sistema de arquivos Linux</text>
<text x="50" y="92" class="sub">Diretórios importantes e o que normalmente existe em cada um.</text>
<rect x="50" y="135" width="300" height="115" rx="18" fill="#f3f4f6" stroke="#d1d5db"/>
<text x="70" y="169" class="box-title">/</text>
<text x="70" y="197" class="box-text">Raiz do sistema. Tudo começa aqui.</text>
<rect x="385" y="135" width="300" height="115" rx="18" fill="#e0f2fe" stroke="#d1d5db"/>
<text x="405" y="169" class="box-title">/home</text>
<text x="405" y="197" class="box-text">Arquivos dos usuários, projetos e</text>
<text x="405" y="217" class="box-text">configurações pessoais.</text>
<rect x="720" y="135" width="300" height="115" rx="18" fill="#dcfce7" stroke="#d1d5db"/>
<text x="740" y="169" class="box-title">/etc</text>
<text x="740" y="197" class="box-text">Arquivos de configuração do</text>
<text x="740" y="217" class="box-text">sistema e serviços.</text>
<rect x="50" y="280" width="300" height="115" rx="18" fill="#fef3c7" stroke="#d1d5db"/>
<text x="70" y="314" class="box-title">/var</text>
<text x="70" y="342" class="box-text">Logs, filas, caches e dados</text>
<text x="70" y="362" class="box-text">variáveis de serviços.</text>
<rect x="385" y="280" width="300" height="115" rx="18" fill="#fee2e2" stroke="#d1d5db"/>
<text x="405" y="314" class="box-title">/usr</text>
<text x="405" y="342" class="box-text">Programas, bibliotecas e arquivos</text>
<text x="405" y="362" class="box-text">compartilhados.</text>
<rect x="720" y="280" width="300" height="115" rx="18" fill="#ede9fe" stroke="#d1d5db"/>
<text x="740" y="314" class="box-title">/tmp</text>
<text x="740" y="342" class="box-text">Arquivos temporários, geralmente</text>
<text x="740" y="362" class="box-text">descartáveis.</text>
</svg>