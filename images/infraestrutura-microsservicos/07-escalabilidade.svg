<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520">

<defs>
  <style>
    .bg{fill:#ffffff}.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:12;ry:12}.accent{fill:#e0f2fe;stroke:#0369a1;stroke-width:2;rx:12;ry:12}.warn{fill:#fef3c7;stroke:#b45309;stroke-width:2;rx:12;ry:12}.ok{fill:#dcfce7;stroke:#15803d;stroke-width:2;rx:12;ry:12}.queue{fill:#f3e8ff;stroke:#7e22ce;stroke-width:2;rx:12;ry:12}.txt{font-family:Arial, sans-serif;font-size:16px;fill:#0f172a}.small{font-family:Arial, sans-serif;font-size:13px;fill:#334155}.title{font-family:Arial, sans-serif;font-size:20px;font-weight:bold;fill:#0f172a}.arrow{stroke:#334155;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
  </style>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker>
</defs>

<rect class="bg" width="1100" height="520"/>
<text class="title" x="40" y="45">Escalabilidade vertical e horizontal</text>
<text class="title" x="100" y="110">Vertical: scale-up</text>
<rect class="warn" x="140" y="160" width="220" height="180"/><text class="txt" x="175" y="215">Servidor maior</text><text class="small" x="170" y="250">+ CPU</text><text class="small" x="170" y="275">+ RAM</text><text class="small" x="170" y="300">+ Disco</text>
<text class="title" x="610" y="110">Horizontal: scale-out</text>
<rect class="accent" x="570" y="160" width="160" height="60"/><text class="txt" x="602" y="197">Load Balancer</text>
<rect class="ok" x="500" y="285" width="130" height="60"/><text class="txt" x="535" y="322">App 1</text>
<rect class="ok" x="675" y="285" width="130" height="60"/><text class="txt" x="710" y="322">App 2</text>
<rect class="ok" x="850" y="285" width="130" height="60"/><text class="txt" x="885" y="322">App 3</text>
<path class="arrow" d="M650 220 L565 285"/><path class="arrow" d="M650 220 L740 285"/><path class="arrow" d="M650 220 L915 285"/>
<text class="small" x="520" y="395">Mais instâncias dividem a carga e reduzem gargalos.</text>
</svg>