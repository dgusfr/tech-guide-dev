<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
<title id="title">Cabeçalhos de proxy e logs</title>
<desc id="desc">Diagrama didático da apostila de NGINX e Proxy.</desc>
<style>
  .bg { fill: #f8fafc; }
  .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 18; }
  .primary { fill: #dbeafe; stroke: #1d4ed8; stroke-width: 2; rx: 18; }
  .green { fill: #dcfce7; stroke: #15803d; stroke-width: 2; rx: 18; }
  .amber { fill: #fef3c7; stroke: #b45309; stroke-width: 2; rx: 18; }
  .red { fill: #fee2e2; stroke: #b91c1c; stroke-width: 2; rx: 18; }
  .purple { fill: #ede9fe; stroke: #6d28d9; stroke-width: 2; rx: 18; }
  .text { font-family: Arial, Helvetica, sans-serif; fill: #0f172a; font-size: 24px; }
  .small { font-family: Arial, Helvetica, sans-serif; fill: #334155; font-size: 18px; }
  .tiny { font-family: Arial, Helvetica, sans-serif; fill: #475569; font-size: 15px; }
  .title { font-family: Arial, Helvetica, sans-serif; fill: #0f172a; font-size: 32px; font-weight: 700; }
  .arrow { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  .dash { stroke: #64748b; stroke-width: 3; stroke-dasharray: 8 8; fill: none; marker-end: url(#arrow); }
  .line { stroke: #94a3b8; stroke-width: 2; fill: none; }
</style>
<defs>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M2,2 L10,6 L2,10 z" fill="#334155" />
  </marker>
</defs>
<rect class="bg" x="0" y="0" width="1200" height="620"/>
<text class="title" x="60" y="56">Cabeçalhos de proxy e logs</text>

<rect class="box" x="70" y="150" width="180" height="120"/>
<text class="small" x="100" y="198">Cliente</text>
<text class="tiny" x="95" y="230">IP real</text>

<rect class="primary" x="380" y="130" width="240" height="160"/>
<text class="text" x="450" y="185">NGINX</text>
<text class="tiny" x="415" y="225">adiciona X-Forwarded-For</text>
<text class="tiny" x="415" y="250">gera access.log</text>

<rect class="purple" x="760" y="150" width="220" height="120"/>
<text class="small" x="807" y="198">Backend</text>
<text class="tiny" x="790" y="230">lê headers confiáveis</text>

<rect class="amber" x="410" y="390" width="300" height="100"/>
<text class="small" x="440" y="432">/var/log/nginx/</text>
<text class="tiny" x="440" y="462">access.log / error.log</text>

<path class="arrow" d="M250 210 H380"/>
<path class="arrow" d="M620 210 H760"/>
<path class="arrow" d="M500 290 V390"/>
<text class="tiny" x="285" y="195">GET /api/users</text>
<text class="tiny" x="650" y="195">proxy_pass + headers</text>

</svg>