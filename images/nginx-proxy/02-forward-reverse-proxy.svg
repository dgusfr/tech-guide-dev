<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
<title id="title">Forward proxy x Reverse proxy</title>
<desc id="desc">Diagrama didático da apostila de NGINX e Proxy.</desc>
<style>
  .bg { fill: #f8fafc; }
  .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 18; }
  .primary { fill: #dbeafe; stroke: #1d4ed8; stroke-width: 2; rx: 18; }
  .green { fill: #dcfce7; stroke: #15803d; stroke-width: 2; rx: 18; }
  .amber { fill: #fef3c7; stroke: #b45309; stroke-width: 2; rx: 18; }
  .red { fill: #fee2e2; stroke: #b91c1c; stroke-width: 2; rx: 18; }
  .purple { fill: #ede9fe; stroke: #6d28d9; stroke-width: 2; rx: 18; }
  .text { font-family: Arial, Helvetica, sans-serif; fill: #0f172a; font-size: 24px; }
  .small { font-family: Arial, Helvetica, sans-serif; fill: #334155; font-size: 18px; }
  .tiny { font-family: Arial, Helvetica, sans-serif; fill: #475569; font-size: 15px; }
  .title { font-family: Arial, Helvetica, sans-serif; fill: #0f172a; font-size: 32px; font-weight: 700; }
  .arrow { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  .dash { stroke: #64748b; stroke-width: 3; stroke-dasharray: 8 8; fill: none; marker-end: url(#arrow); }
  .line { stroke: #94a3b8; stroke-width: 2; fill: none; }
</style>
<defs>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M2,2 L10,6 L2,10 z" fill="#334155" />
  </marker>
</defs>
<rect class="bg" x="0" y="0" width="1200" height="620"/>
<text class="title" x="60" y="56">Forward proxy x Reverse proxy</text>

<text class="text" x="95" y="115">Forward proxy</text>
<rect class="box" x="70" y="160" width="170" height="95"/>
<text class="small" x="108" y="205">Cliente</text>
<rect class="amber" x="330" y="160" width="190" height="95"/>
<text class="small" x="358" y="205">Proxy da empresa</text>
<rect class="green" x="620" y="160" width="190" height="95"/>
<text class="small" x="662" y="205">Internet / site</text>
<path class="arrow" d="M240 207 H330"/>
<path class="arrow" d="M520 207 H620"/>
<text class="tiny" x="80" y="285">Representa o cliente. Controla acesso, privacidade, cache e auditoria.</text>

<line class="line" x1="60" y1="325" x2="1140" y2="325"/>

<text class="text" x="95" y="385">Reverse proxy</text>
<rect class="box" x="70" y="430" width="170" height="95"/>
<text class="small" x="108" y="475">Cliente</text>
<rect class="primary" x="330" y="430" width="190" height="95"/>
<text class="small" x="365" y="475">NGINX</text>
<rect class="purple" x="620" y="385" width="190" height="80"/>
<text class="small" x="675" y="432">API 1</text>
<rect class="purple" x="620" y="505" width="190" height="80"/>
<text class="small" x="675" y="552">API 2</text>
<path class="arrow" d="M240 477 H330"/>
<path class="arrow" d="M520 465 C565 425 585 425 620 425"/>
<path class="arrow" d="M520 490 C565 545 585 545 620 545"/>
<text class="tiny" x="80" y="560">Representa os servidores. Protege backends, roteia URLs e centraliza HTTPS.</text>

</svg>